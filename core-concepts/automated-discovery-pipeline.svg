<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fef9c3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fdf2f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">The Automated Scientific Discovery Pipeline</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#64748b">How AI systems progress from idea to published paper</text>

  <!-- Era labels at top -->
  <text x="140" y="78" text-anchor="middle" font-size="10" fill="#3b82f6" font-weight="600">IDEATION</text>
  <text x="370" y="78" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">EXPERIMENTATION</text>
  <text x="600" y="78" text-anchor="middle" font-size="10" fill="#ca8a04" font-weight="600">ANALYSIS</text>
  <text x="790" y="78" text-anchor="middle" font-size="10" fill="#db2777" font-weight="600">COMMUNICATION</text>

  <!-- Phase 1: Ideation -->
  <rect x="40" y="90" width="200" height="140" rx="12" fill="url(#grad1)" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="140" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Hypothesis Generation</text>
  <text x="60" y="138" font-size="11" fill="#334155">LLM reads literature</text>
  <text x="60" y="156" font-size="11" fill="#334155">Identifies research gaps</text>
  <text x="60" y="174" font-size="11" fill="#334155">Proposes novel ideas</text>
  <text x="60" y="198" font-size="10" fill="#6b7280" font-style="italic">Tools: Semantic Scholar,</text>
  <text x="60" y="212" font-size="10" fill="#6b7280" font-style="italic">HuggingFace Papers API</text>

  <!-- Arrow 1→2 -->
  <line x1="245" y1="160" x2="275" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: Experimentation -->
  <rect x="280" y="90" width="200" height="140" rx="12" fill="url(#grad2)" stroke="#86efac" stroke-width="1.5"/>
  <text x="380" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Experiment Design & Run</text>
  <text x="300" y="138" font-size="11" fill="#334155">AI writes experiment code</text>
  <text x="300" y="156" font-size="11" fill="#334155">Agentic tree search</text>
  <text x="300" y="174" font-size="11" fill="#334155">Runs on GPU clusters</text>
  <text x="300" y="198" font-size="10" fill="#6b7280" font-style="italic">Tools: Aider, AIDE,</text>
  <text x="300" y="212" font-size="10" fill="#6b7280" font-style="italic">Autoresearch</text>

  <!-- Arrow 2→3 -->
  <line x1="485" y1="160" x2="510" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: Analysis -->
  <rect x="515" y="90" width="175" height="140" rx="12" fill="url(#grad3)" stroke="#fde047" stroke-width="1.5"/>
  <text x="602" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#854d0e">Results Analysis</text>
  <text x="535" y="138" font-size="11" fill="#334155">Parse metrics</text>
  <text x="535" y="156" font-size="11" fill="#334155">VLM figure critique</text>
  <text x="535" y="174" font-size="11" fill="#334155">Statistical validation</text>
  <text x="535" y="198" font-size="10" fill="#6b7280" font-style="italic">Tools: GPT-4o (VLM),</text>
  <text x="535" y="212" font-size="10" fill="#6b7280" font-style="italic">matplotlib, numpy</text>

  <!-- Arrow 3→4 -->
  <line x1="695" y1="160" x2="710" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: Communication -->
  <rect x="715" y="90" width="160" height="140" rx="12" fill="url(#grad4)" stroke="#f9a8d4" stroke-width="1.5"/>
  <text x="795" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#9d174d">Paper Writing</text>
  <text x="735" y="138" font-size="11" fill="#334155">LaTeX generation</text>
  <text x="735" y="156" font-size="11" fill="#334155">Automated review</text>
  <text x="735" y="174" font-size="11" fill="#334155">Revision cycle</text>
  <text x="735" y="198" font-size="10" fill="#6b7280" font-style="italic">$6-15 per paper</text>
  <text x="735" y="212" font-size="10" fill="#6b7280" font-style="italic">~3.5 hours total</text>

  <!-- Recursive improvement loop -->
  <path d="M 795 235 L 795 270 Q 795 285 780 285 L 160 285 Q 140 285 140 270 L 140 235" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <rect x="380" y="272" width="160" height="24" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="460" y="289" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">Recursive Improvement</text>

  <!-- Learning Application Section -->
  <rect x="40" y="320" width="835" height="180" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">How This Applies to Real-World Learning</text>

  <!-- Three application boxes -->
  <rect x="60" y="360" width="240" height="120" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="180" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Simulation-Based Learning</text>
  <text x="80" y="405" font-size="10" fill="#334155">Students practice in simulated</text>
  <text x="80" y="420" font-size="10" fill="#334155">environments before real-world</text>
  <text x="80" y="435" font-size="10" fill="#334155">application. World models predict</text>
  <text x="80" y="450" font-size="10" fill="#334155">outcomes, enabling risk-free</text>
  <text x="80" y="465" font-size="10" fill="#334155">experimentation and faster mastery.</text>

  <rect x="330" y="360" width="240" height="120" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="450" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Recursive Skill Building</text>
  <text x="350" y="405" font-size="10" fill="#334155">AI tutors that improve their</text>
  <text x="350" y="420" font-size="10" fill="#334155">teaching with each interaction.</text>
  <text x="350" y="435" font-size="10" fill="#334155">RCT evidence: AI tutoring adds</text>
  <text x="350" y="450" font-size="10" fill="#334155">2 months of academic progress.</text>
  <text x="350" y="465" font-size="10" fill="#334155">Meta-learning adapts to each learner.</text>

  <rect x="600" y="360" width="250" height="120" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="725" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">Applied Domain Knowledge</text>
  <text x="620" y="405" font-size="10" fill="#334155">E-commerce agents learn market</text>
  <text x="620" y="420" font-size="10" fill="#334155">dynamics through interaction.</text>
  <text x="620" y="435" font-size="10" fill="#334155">Shopping agents develop preferences</text>
  <text x="620" y="450" font-size="10" fill="#334155">and biases — studying these helps</text>
  <text x="620" y="465" font-size="10" fill="#334155">users become better decision-makers.</text>

  <!-- Footer -->
  <text x="450" y="515" text-anchor="middle" font-size="10" fill="#94a3b8">Sources: Lu et al. 2026 (Nature), Jurenka et al. 2025 (LearnLM RCT), Allouah et al. 2025 (ACES)</text>
</svg>
