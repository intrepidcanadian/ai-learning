<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a6fa5"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <linearGradient id="ideal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="gap-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee"/>
      <stop offset="100%" style="stop-color:#ffcdd2"/>
    </linearGradient>
    <linearGradient id="fix-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#16213e">The Foresight Gap: Why Having a World Model ≠ Using It</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#666">Qian et al. (2026) — arXiv:2601.03905</text>

  <!-- LEFT PANEL: Ideal Loop -->
  <rect x="20" y="75" width="290" height="370" rx="12" fill="url(#ideal-bg)" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">Ideal: Predict-Then-Act</text>

  <!-- Ideal loop nodes -->
  <rect x="85" y="120" width="160" height="36" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">1. Encounter Task</text>

  <rect x="85" y="180" width="160" height="36" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="203" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">2. Invoke Simulation</text>

  <rect x="85" y="240" width="160" height="36" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="263" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">3. Interpret Prediction</text>

  <rect x="85" y="300" width="160" height="36" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="323" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">4. Plan from Foresight</text>

  <rect x="85" y="360" width="160" height="36" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="165" y="383" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">5. Act with Confidence</text>

  <!-- Arrows -->
  <line x1="165" y1="156" x2="165" y2="180" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="165" y1="216" x2="165" y2="240" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="165" y1="276" x2="165" y2="300" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="165" y1="336" x2="165" y2="360" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-green)"/>

  <text x="165" y="420" text-anchor="middle" font-size="12" fill="#2e7d32" font-style="italic">✓ Optimal outcomes</text>

  <!-- CENTER PANEL: The Gap -->
  <rect x="335" y="75" width="290" height="370" rx="12" fill="url(#gap-bg)" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#b71c1c">Reality: The Foresight Gap</text>

  <!-- Gap nodes -->
  <rect x="400" y="120" width="160" height="36" rx="8" fill="#fff" stroke="#c0392b" stroke-width="1.5"/>
  <text x="480" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#b71c1c">1. Encounter Task</text>

  <!-- Skip arrow -->
  <line x1="480" y1="156" x2="480" y2="293" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arr-red)"/>
  <text x="545" y="200" font-size="11" fill="#c0392b" font-weight="600">&lt;1% invoke</text>
  <text x="545" y="215" font-size="11" fill="#c0392b" font-weight="600">simulation</text>

  <!-- Skipped simulation (ghosted) -->
  <rect x="400" y="180" width="160" height="36" rx="8" fill="#fff" stroke="#e57373" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="480" y="203" text-anchor="middle" font-size="13" fill="#e57373">2. Invoke Simulation</text>

  <rect x="400" y="240" width="160" height="36" rx="8" fill="#fff" stroke="#e57373" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="480" y="263" text-anchor="middle" font-size="13" fill="#e57373">3. Interpret (~15% error)</text>

  <rect x="400" y="300" width="160" height="36" rx="8" fill="#fff" stroke="#c0392b" stroke-width="1.5"/>
  <text x="480" y="323" text-anchor="middle" font-size="13" font-weight="600" fill="#b71c1c">4. Act Without Foresight</text>

  <!-- Performance arrow -->
  <rect x="400" y="360" width="160" height="36" rx="8" fill="#ffcdd2" stroke="#c0392b" stroke-width="1.5"/>
  <text x="480" y="383" text-anchor="middle" font-size="13" font-weight="600" fill="#b71c1c">↓ Up to 5% worse</text>

  <text x="480" y="420" text-anchor="middle" font-size="12" fill="#c62828" font-style="italic">✗ Degraded performance</text>

  <!-- RIGHT PANEL: The Fix -->
  <rect x="650" y="75" width="290" height="370" rx="12" fill="url(#fix-bg)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <text x="795" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">Fix: Metacognitive Training</text>

  <rect x="680" y="125" width="230" height="55" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="795" y="145" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">When to Simulate?</text>
  <text x="795" y="165" text-anchor="middle" font-size="11" fill="#555">Imagine-then-Plan: adaptive</text>
  <text x="795" y="177" text-anchor="middle" font-size="11" fill="#555">lookahead depth</text>

  <rect x="680" y="195" width="230" height="55" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="795" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">How to Interpret?</text>
  <text x="795" y="235" text-anchor="middle" font-size="11" fill="#555">WAV: forward-inverse verification</text>
  <text x="795" y="247" text-anchor="middle" font-size="11" fill="#555">asymmetry for quality signals</text>

  <rect x="680" y="265" width="230" height="55" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="795" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">How to Integrate?</text>
  <text x="795" y="305" text-anchor="middle" font-size="11" fill="#555">SRLM: uncertainty-calibrated</text>
  <text x="795" y="317" text-anchor="middle" font-size="11" fill="#555">selective verification</text>

  <rect x="680" y="335" width="230" height="55" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="795" y="355" text-anchor="middle" font-size="12" font-weight="600" fill="#0d47a1">How to Orchestrate?</text>
  <text x="795" y="375" text-anchor="middle" font-size="11" fill="#555">Hyperagents: recursive meta-</text>
  <text x="795" y="387" text-anchor="middle" font-size="11" fill="#555">cognitive self-improvement</text>

  <text x="795" y="425" text-anchor="middle" font-size="12" fill="#1565c0" font-style="italic">→ Teach the meta-skill</text>

  <!-- BOTTOM: Cross-domain implications -->
  <rect x="20" y="470" width="920" height="220" rx="12" fill="#fafafa" stroke="#9e9e9e" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="498" text-anchor="middle" font-size="16" font-weight="700" fill="#16213e">Cross-Domain Implications: The Foresight Gap in Every Domain</text>

  <!-- Simulation column -->
  <rect x="40" y="515" width="280" height="155" rx="8" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="180" y="537" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">🔮 Simulation</text>
  <text x="55" y="557" font-size="11" fill="#333">Students with access to simulations</text>
  <text x="55" y="572" font-size="11" fill="#333">still skip mental prediction. Fix:</text>
  <text x="55" y="592" font-size="11" fill="#1565c0" font-weight="600">Require "predict first" before</text>
  <text x="55" y="607" font-size="11" fill="#1565c0" font-weight="600">running experiments. Physics</text>
  <text x="55" y="622" font-size="11" fill="#1565c0" font-weight="600">students who predict outcomes</text>
  <text x="55" y="637" font-size="11" fill="#1565c0" font-weight="600">before lab work learn 2× faster.</text>
  <text x="55" y="657" font-size="10" fill="#888">DreamerV3, Imagine-then-Plan</text>

  <!-- Recursion column -->
  <rect x="340" y="515" width="280" height="155" rx="8" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="480" y="537" text-anchor="middle" font-size="13" font-weight="700" fill="#7b1fa2">🔄 Recursion</text>
  <text x="355" y="557" font-size="11" fill="#333">Self-improving agents optimize</text>
  <text x="355" y="572" font-size="11" fill="#333">tasks, not foresight strategy. Fix:</text>
  <text x="355" y="592" font-size="11" fill="#7b1fa2" font-weight="600">Recursively improve the foresight</text>
  <text x="355" y="607" font-size="11" fill="#7b1fa2" font-weight="600">policy itself. TRT achieves 100%</text>
  <text x="355" y="622" font-size="11" fill="#7b1fa2" font-weight="600">AIME by knowing WHEN recursive</text>
  <text x="355" y="637" font-size="11" fill="#7b1fa2" font-weight="600">verification is worth the cost.</text>
  <text x="355" y="657" font-size="10" fill="#888">TRT, Hyperagents, SRLM</text>

  <!-- Commerce column -->
  <rect x="640" y="515" width="280" height="155" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="780" y="537" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">🛒 Commerce</text>
  <text x="655" y="557" font-size="11" fill="#333">Shopping agents with forecast</text>
  <text x="655" y="572" font-size="11" fill="#333">models still recommend impulsively. Fix:</text>
  <text x="655" y="592" font-size="11" fill="#2e7d32" font-weight="600">Strategic inquiry before action.</text>
  <text x="655" y="607" font-size="11" fill="#2e7d32" font-weight="600">Solicit-Then-Suggest shows better</text>
  <text x="655" y="622" font-size="11" fill="#2e7d32" font-weight="600">questions improve match quality</text>
  <text x="655" y="637" font-size="11" fill="#2e7d32" font-weight="600">faster than more options.</text>
  <text x="655" y="657" font-size="10" fill="#888">Solicit-Then-Suggest, ACES</text>
</svg>