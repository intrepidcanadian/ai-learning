<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <linearGradient id="bestPath" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">AIDE Solution Tree Architecture</text>

  <!-- Best path highlight -->
  <path d="M340,55 L340,105 L220,165 L220,215 L150,275 L150,325" stroke="#22c55e" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.5"/>

  <!-- Root node -->
  <rect x="290" y="50" width="100" height="40" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="340" y="74" text-anchor="middle" font-size="11" fill="white" font-weight="600">Draft v1</text>
  <text x="340" y="100" text-anchor="middle" font-size="9" fill="#94a3b8">score: 0.42</text>

  <!-- Level 2 nodes -->
  <!-- Left: Improve -->
  <line x1="310" y1="90" x2="220" y2="140" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="170" y="140" width="100" height="40" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="220" y="164" text-anchor="middle" font-size="11" fill="white" font-weight="600">Improve v1.1</text>
  <text x="220" y="190" text-anchor="middle" font-size="9" fill="#94a3b8">score: 0.58</text>

  <!-- Right: New Draft -->
  <line x1="370" y1="90" x2="480" y2="140" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="430" y="140" width="100" height="40" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="480" y="164" text-anchor="middle" font-size="11" fill="white" font-weight="600">Draft v2</text>
  <text x="480" y="190" text-anchor="middle" font-size="9" fill="#94a3b8">score: 0.35</text>

  <!-- Level 3 nodes -->
  <!-- Left-Left: Best path -->
  <line x1="195" y1="180" x2="150" y2="230" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="100" y="230" width="100" height="40" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="254" text-anchor="middle" font-size="11" fill="white" font-weight="600">Improve v1.2</text>
  <text x="150" y="280" text-anchor="middle" font-size="9" fill="#166534">score: 0.71 ★</text>

  <!-- Left-Right -->
  <line x1="245" y1="180" x2="290" y2="230" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="240" y="230" width="100" height="40" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="290" y="254" text-anchor="middle" font-size="11" fill="white" font-weight="600">Improve v1.3</text>
  <text x="290" y="280" text-anchor="middle" font-size="9" fill="#94a3b8">score: 0.52</text>

  <!-- Right-Left: Pruned -->
  <line x1="455" y1="180" x2="420" y2="230" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="370" y="230" width="100" height="40" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <text x="420" y="254" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">Error ✕</text>
  <text x="420" y="280" text-anchor="middle" font-size="9" fill="#ef4444">timeout</text>

  <!-- Right-Right -->
  <line x1="505" y1="180" x2="560" y2="230" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="510" y="230" width="100" height="40" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="560" y="254" text-anchor="middle" font-size="11" fill="white" font-weight="600">Improve v2.1</text>
  <text x="560" y="280" text-anchor="middle" font-size="9" fill="#94a3b8">score: 0.48</text>

  <!-- Level 4: Best continues -->
  <line x1="150" y1="270" x2="150" y2="320" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="100" y="320" width="100" height="40" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="344" text-anchor="middle" font-size="11" fill="white" font-weight="600">Improve v1.4</text>
  <text x="150" y="370" text-anchor="middle" font-size="9" fill="#166534">score: 0.83 ★★</text>

  <!-- Legend -->
  <rect x="30" y="400" width="660" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="422" font-size="11" font-weight="bold" fill="#1e293b">Legend:</text>

  <rect x="50" y="433" width="14" height="14" rx="3" fill="#6366f1"/>
  <text x="70" y="445" font-size="10" fill="#475569">Improve (refine existing)</text>

  <rect x="210" y="433" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="230" y="445" font-size="10" fill="#475569">Draft (new solution)</text>

  <rect x="370" y="433" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="390" y="445" font-size="10" fill="#475569">Best path (selected)</text>

  <rect x="530" y="433" width="14" height="14" rx="3" fill="#fecaca" stroke="#ef4444"/>
  <text x="550" y="445" font-size="10" fill="#475569">Pruned (error)</text>

  <text x="360" y="465" text-anchor="middle" font-size="9" fill="#94a3b8">Each node = complete Python script + execution results + performance metric</text>
</svg>
