<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="25" width="900" height="25" fill="url(#headerGrad)"/>
  <text x="450" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Semantic Scholar Graph Analytics → Structured Learning Pipeline</text>

  <!-- Layer 1: Data Sources -->
  <text x="50" y="85" fill="#64748b" font-size="12" font-weight="bold">DATA SOURCES</text>

  <rect x="30" y="95" width="120" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="118" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">225M+ Papers</text>
  <text x="90" y="138" text-anchor="middle" fill="#3b82f6" font-size="10">Full-text corpus</text>

  <rect x="170" y="95" width="120" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="118" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">2.8B Citations</text>
  <text x="230" y="138" text-anchor="middle" fill="#3b82f6" font-size="10">Directed graph edges</text>

  <rect x="310" y="95" width="120" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="370" y="118" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold">100M Authors</text>
  <text x="370" y="138" text-anchor="middle" fill="#3b82f6" font-size="10">Authorship network</text>

  <!-- Arrows from sources to AI features -->
  <line x1="90" y1="150" x2="90" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="150" x2="350" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="150" x2="500" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: AI Features -->
  <text x="50" y="200" fill="#64748b" font-size="12" font-weight="bold">AI FEATURES</text>

  <rect x="30" y="210" width="140" height="65" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="100" y="233" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">TLDR Summaries</text>
  <text x="100" y="250" text-anchor="middle" fill="#b45309" font-size="10">AI-generated</text>
  <text x="100" y="265" text-anchor="middle" fill="#b45309" font-size="10">1-sentence abstracts</text>

  <rect x="190" y="210" width="140" height="65" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="233" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">Citation Intent</text>
  <text x="260" y="250" text-anchor="middle" fill="#b45309" font-size="10">Background / Method /</text>
  <text x="260" y="265" text-anchor="middle" fill="#b45309" font-size="10">Result classification</text>

  <rect x="350" y="210" width="140" height="65" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="233" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">Influence Score</text>
  <text x="420" y="250" text-anchor="middle" fill="#b45309" font-size="10">Weighted impact</text>
  <text x="420" y="265" text-anchor="middle" fill="#b45309" font-size="10">beyond raw counts</text>

  <rect x="510" y="210" width="140" height="65" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="580" y="233" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">SPECTER2</text>
  <text x="580" y="250" text-anchor="middle" fill="#b45309" font-size="10">Semantic embedding</text>
  <text x="580" y="265" text-anchor="middle" fill="#b45309" font-size="10">similarity search</text>

  <!-- Arrows to Learning Strategies -->
  <line x1="100" y1="275" x2="200" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="275" x2="350" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="275" x2="500" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="275" x2="650" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Structured Learning Strategies -->
  <text x="50" y="350" fill="#64748b" font-size="12" font-weight="bold">LEARNING STRATEGIES</text>

  <rect x="130" y="360" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="210" y="383" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">1. Rapid Screening</text>
  <text x="210" y="400" text-anchor="middle" fill="#15803d" font-size="10">TLDRs filter 100s of</text>
  <text x="210" y="413" text-anchor="middle" fill="#15803d" font-size="10">papers → top 10 reading list</text>

  <rect x="310" y="360" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="390" y="383" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">2. Method Mapping</text>
  <text x="390" y="400" text-anchor="middle" fill="#15803d" font-size="10">Intent classifiers show</text>
  <text x="390" y="413" text-anchor="middle" fill="#15803d" font-size="10">which papers USE a method</text>

  <rect x="490" y="360" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="570" y="383" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">3. Impact Ranking</text>
  <text x="570" y="400" text-anchor="middle" fill="#15803d" font-size="10">Influence scores order</text>
  <text x="570" y="413" text-anchor="middle" fill="#15803d" font-size="10">reading by importance</text>

  <rect x="670" y="360" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="750" y="383" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">4. Gap Discovery</text>
  <text x="750" y="400" text-anchor="middle" fill="#15803d" font-size="10">Embeddings reveal</text>
  <text x="750" y="413" text-anchor="middle" fill="#15803d" font-size="10">related work you missed</text>

  <!-- Bottom: Output -->
  <line x1="210" y1="420" x2="430" y2="470" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="420" x2="430" y2="470" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="420" x2="480" y2="470" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="420" x2="530" y2="470" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="350" y="465" width="250" height="45" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="475" y="487" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="bold">Personalized Curriculum</text>
  <text x="475" y="503" text-anchor="middle" fill="#7c3aed" font-size="10">Ordered, complete, application-ready</text>

  <!-- Side panel: Key Insight -->
  <rect x="680" y="85" width="200" height="125" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
  <text x="780" y="108" text-anchor="middle" fill="#9d174d" font-size="12" font-weight="bold">Key Insight</text>
  <text x="780" y="128" text-anchor="middle" fill="#be185d" font-size="10">Citation graphs transform</text>
  <text x="780" y="143" text-anchor="middle" fill="#be185d" font-size="10">passive reading into</text>
  <text x="780" y="158" text-anchor="middle" fill="#be185d" font-size="10">active, structured learning.</text>
  <text x="780" y="178" text-anchor="middle" fill="#be185d" font-size="10">AI features (TLDR, intent,</text>
  <text x="780" y="193" text-anchor="middle" fill="#be185d" font-size="10">embeddings) automate the</text>
  <text x="780" y="208" text-anchor="middle" fill="#be185d" font-size="10">curation a mentor provides.</text>
</svg>