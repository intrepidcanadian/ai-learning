<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="800" height="50" fill="url(#headerGrad)" rx="12"/>
  <rect x="0" y="30" width="800" height="20" fill="url(#headerGrad)"/>
  <text x="400" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Automated Peer Review Pipeline</text>

  <!-- Stage 1: Paper Parsing -->
  <rect x="40" y="75" width="160" height="100" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="120" y="98" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">Stage 1</text>
  <text x="120" y="116" text-anchor="middle" fill="#1e40af" font-size="11">Paper Parsing</text>
  <text x="120" y="136" text-anchor="middle" fill="#475569" font-size="10">PDF layout analysis</text>
  <text x="120" y="150" text-anchor="middle" fill="#475569" font-size="10">Figure extraction</text>
  <text x="120" y="164" text-anchor="middle" fill="#475569" font-size="10">Section structuring</text>

  <!-- Arrow 1->2 -->
  <line x1="200" y1="125" x2="240" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Claim Extraction -->
  <rect x="250" y="75" width="160" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="330" y="98" text-anchor="middle" fill="#92400e" font-size="13" font-weight="bold">Stage 2</text>
  <text x="330" y="116" text-anchor="middle" fill="#92400e" font-size="11">Claim Verification</text>
  <text x="330" y="136" text-anchor="middle" fill="#475569" font-size="10">Novelty assessment</text>
  <text x="330" y="150" text-anchor="middle" fill="#475569" font-size="10">Method validation</text>
  <text x="330" y="164" text-anchor="middle" fill="#475569" font-size="10">Statistical rigor</text>

  <!-- Arrow 2->3 -->
  <line x1="410" y1="125" x2="450" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: Multi-Perspective Review -->
  <rect x="460" y="75" width="160" height="100" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="540" y="98" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Stage 3</text>
  <text x="540" y="116" text-anchor="middle" fill="#065f46" font-size="11">Multi-Agent Review</text>
  <text x="540" y="136" text-anchor="middle" fill="#475569" font-size="10">Soundness reviewer</text>
  <text x="540" y="150" text-anchor="middle" fill="#475569" font-size="10">Novelty reviewer</text>
  <text x="540" y="164" text-anchor="middle" fill="#475569" font-size="10">Clarity reviewer</text>

  <!-- Arrow 3->4 -->
  <line x1="620" y1="125" x2="660" y2="125" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Meta-Review -->
  <rect x="670" y="75" width="110" height="100" fill="#fce7f3" stroke="#ec4899" stroke-width="2" rx="8"/>
  <text x="725" y="98" text-anchor="middle" fill="#9d174d" font-size="13" font-weight="bold">Stage 4</text>
  <text x="725" y="116" text-anchor="middle" fill="#9d174d" font-size="11">Meta-Review</text>
  <text x="725" y="136" text-anchor="middle" fill="#475569" font-size="10">Synthesis</text>
  <text x="725" y="150" text-anchor="middle" fill="#475569" font-size="10">Calibration</text>
  <text x="725" y="164" text-anchor="middle" fill="#475569" font-size="10">Final decision</text>

  <!-- Performance comparison section -->
  <rect x="40" y="205" width="720" height="145" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <text x="400" y="230" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Performance: Automated vs. Human Review</text>

  <!-- Bar chart -->
  <!-- Balanced Accuracy -->
  <text x="100" y="265" text-anchor="end" fill="#475569" font-size="11">Balanced Acc.</text>
  <rect x="110" y="253" width="198" height="16" fill="#3b82f6" rx="3"/>
  <text x="315" y="265" fill="white" font-size="10" font-weight="bold">0.66</text>
  <rect x="110" y="272" width="207" height="16" fill="#8b5cf6" rx="3"/>
  <text x="324" y="284" fill="white" font-size="10" font-weight="bold">0.69</text>

  <!-- F1 Score -->
  <text x="100" y="308" text-anchor="end" fill="#475569" font-size="11">F1 Score</text>
  <rect x="110" y="296" width="147" height="16" fill="#3b82f6" rx="3"/>
  <text x="264" y="308" fill="white" font-size="10" font-weight="bold">0.49</text>
  <rect x="110" y="315" width="201" height="16" fill="#8b5cf6" rx="3"/>
  <text x="318" y="327" fill="white" font-size="10" font-weight="bold">0.67</text>

  <!-- Legend -->
  <rect x="500" y="265" width="14" height="14" fill="#3b82f6" rx="2"/>
  <text x="520" y="277" fill="#475569" font-size="11">Human Reviewers</text>
  <rect x="500" y="288" width="14" height="14" fill="#8b5cf6" rx="2"/>
  <text x="520" y="300" fill="#475569" font-size="11">Automated Reviewer</text>

  <!-- Strengths and Weaknesses -->
  <rect x="40" y="370" width="350" height="130" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="8"/>
  <text x="215" y="395" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Strengths</text>
  <text x="60" y="415" fill="#475569" font-size="11">Low false negative rate (0.17)</text>
  <text x="60" y="435" fill="#475569" font-size="11">Consistent across reviews</text>
  <text x="60" y="455" fill="#475569" font-size="11">Minutes vs. weeks for human review</text>
  <text x="60" y="475" fill="#475569" font-size="11">Scales to thousands of papers</text>

  <rect x="410" y="370" width="350" height="130" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" rx="8"/>
  <text x="585" y="395" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Challenges</text>
  <text x="430" y="415" fill="#475569" font-size="11">High false positive rate (0.45-0.52)</text>
  <text x="430" y="435" fill="#475569" font-size="11">Cannot verify experiments</text>
  <text x="430" y="455" fill="#475569" font-size="11">Surface-level evaluation</text>
  <text x="430" y="475" fill="#475569" font-size="11">Gameable via optimization</text>
</svg>
