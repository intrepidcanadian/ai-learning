<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="simGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5F9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="recGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8893C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0652A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BAE5B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D8A3D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="learnerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D3C98;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7D3C98"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#F8F9FA" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">The Educational Simulation Stack: How AI Improves Real-World Skill Learning</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#7F8C8D">Four layers from physical simulation to situated practice, each feeding the next</text>

  <!-- Layer 1: Physical Simulation (bottom) -->
  <rect x="60" y="480" width="480" height="90" rx="8" fill="url(#simGrad)" filter="url(#shadow)"/>
  <text x="300" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Layer 1: World Model Simulation</text>
  <text x="300" y="528" text-anchor="middle" font-size="11" fill="#D6E9FF">DreamerV3 · Genie 3 · V-JEPA 2 · EgoSim · LeWM</text>
  <text x="300" y="546" text-anchor="middle" font-size="10" fill="#B0D0FF">Predicts physical consequences of actions in simulated environments</text>
  <text x="300" y="560" text-anchor="middle" font-size="10" fill="#B0D0FF">Timescale: milliseconds to minutes</text>

  <!-- Layer 2: Classroom Simulation -->
  <rect x="60" y="370" width="480" height="90" rx="8" fill="url(#simGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="300" y="400" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Layer 2: Social Learning Simulation</text>
  <text x="300" y="418" text-anchor="middle" font-size="11" fill="#D6E9FF">EduVerse · SocioVerse · Valid Student Simulation</text>
  <text x="300" y="436" text-anchor="middle" font-size="10" fill="#B0D0FF">Simulates multi-agent classrooms, learner states, and population behavior</text>
  <text x="300" y="450" text-anchor="middle" font-size="10" fill="#B0D0FF">Timescale: sessions to semesters</text>

  <!-- Layer 3: Recursive Improvement -->
  <rect x="60" y="260" width="480" height="90" rx="8" fill="url(#recGrad)" filter="url(#shadow)"/>
  <text x="300" y="290" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Layer 3: Recursive Self-Improvement</text>
  <text x="300" y="308" text-anchor="middle" font-size="11" fill="#FFE0C0">EvoScientist · A-Evolve · LADDER · GASP · Skill0</text>
  <text x="300" y="326" text-anchor="middle" font-size="10" fill="#FFD0A0">Teaching strategies evolve: generate → evaluate → improve → repeat</text>
  <text x="300" y="340" text-anchor="middle" font-size="10" fill="#FFD0A0">Each iteration improves both content and pedagogy</text>

  <!-- Layer 4: Situated Learning Context -->
  <rect x="60" y="150" width="480" height="90" rx="8" fill="url(#sitGrad)" filter="url(#shadow)"/>
  <text x="300" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Layer 4: Situated Learning Context</text>
  <text x="300" y="198" text-anchor="middle" font-size="11" fill="#D0F0D0">Grounded Simulation · AgentTutor · OECD Design Principles</text>
  <text x="300" y="216" text-anchor="middle" font-size="10" fill="#B0E0B0">Connects simulation to authentic real-world contexts and goals</text>
  <text x="300" y="230" text-anchor="middle" font-size="10" fill="#B0E0B0">Ensures transfer from virtual practice to real performance</text>

  <!-- Learner outcome at top -->
  <rect x="140" y="75" width="320" height="55" rx="28" fill="url(#learnerGrad)" filter="url(#shadow)"/>
  <text x="300" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Real-World Skill Mastery</text>
  <text x="300" y="118" text-anchor="middle" font-size="10" fill="#E0C0F0">Transferable competence in authentic contexts</text>

  <!-- Vertical arrows between layers -->
  <line x1="300" y1="470" x2="300" y2="462" stroke="#666" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="300" y1="360" x2="300" y2="352" stroke="#666" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="300" y1="250" x2="300" y2="242" stroke="#666" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="300" y1="140" x2="300" y2="132" stroke="#7D3C98" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Right side: Key evidence panel -->
  <rect x="580" y="75" width="280" height="500" rx="8" fill="white" stroke="#DDD" stroke-width="1" filter="url(#shadow)"/>
  <text x="720" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C3E50">Key Evidence (2026)</text>
  <line x1="600" y1="110" x2="840" y2="110" stroke="#EEE" stroke-width="1"/>

  <!-- Evidence items -->
  <circle cx="610" cy="135" r="6" fill="#5BAE5B"/>
  <text x="625" y="132" font-size="10" fill="#2C3E50" font-weight="bold">OECD Finding</text>
  <text x="625" y="146" font-size="9" fill="#555">Scaffolded AI: +127% learning</text>
  <text x="625" y="158" font-size="9" fill="#555">Generic AI: −17% after removal</text>

  <circle cx="610" cy="185" r="6" fill="#4A90D9"/>
  <text x="625" y="182" font-size="10" fill="#2C3E50" font-weight="bold">MedSimAI RCT</text>
  <text x="625" y="196" font-size="9" fill="#555">410 students, 3 med schools</text>
  <text x="625" y="208" font-size="9" fill="#555">OSCE: 82.8 → 88.8 (d=0.75)</text>

  <circle cx="610" cy="235" r="6" fill="#4A90D9"/>
  <text x="625" y="232" font-size="10" fill="#2C3E50" font-weight="bold">EduVerse Validation</text>
  <text x="625" y="246" font-size="9" fill="#555">Simulated IRF matches real classrooms</text>
  <text x="625" y="258" font-size="9" fill="#555">+11.7% positive transitions</text>

  <circle cx="610" cy="285" r="6" fill="#E8893C"/>
  <text x="625" y="282" font-size="10" fill="#2C3E50" font-weight="bold">AI Tutoring RCT</text>
  <text x="625" y="296" font-size="9" fill="#555">0.73–1.3 SD effect size</text>
  <text x="625" y="308" font-size="9" fill="#555">+70% completion, −15% dropout</text>

  <circle cx="610" cy="335" r="6" fill="#E8893C"/>
  <text x="625" y="332" font-size="10" fill="#2C3E50" font-weight="bold">LADDER</text>
  <text x="625" y="346" font-size="9" fill="#555">1% → 82% accuracy (math)</text>
  <text x="625" y="358" font-size="9" fill="#555">No curated data needed</text>

  <circle cx="610" cy="385" r="6" fill="#E8893C"/>
  <text x="625" y="382" font-size="10" fill="#2C3E50" font-weight="bold">EvoScientist</text>
  <text x="625" y="396" font-size="9" fill="#555">Outperforms 7 SOTA systems</text>
  <text x="625" y="408" font-size="9" fill="#555">Dual memory enables evolution</text>

  <circle cx="610" cy="435" r="6" fill="#9B59B6"/>
  <text x="625" y="432" font-size="10" fill="#2C3E50" font-weight="bold">Situated Learning Theory</text>
  <text x="625" y="446" font-size="9" fill="#555">Knowledge ↔ context inseparable</text>
  <text x="625" y="458" font-size="9" fill="#555">Contextual authenticity drives transfer</text>

  <!-- Legend -->
  <line x1="600" y1="490" x2="840" y2="490" stroke="#EEE" stroke-width="1"/>
  <text x="720" y="510" text-anchor="middle" font-size="10" font-weight="bold" fill="#2C3E50">Principle</text>
  <text x="720" y="528" text-anchor="middle" font-size="9" fill="#555">Each layer feeds the next:</text>
  <text x="720" y="544" text-anchor="middle" font-size="9" fill="#555">Simulate → Socialize → Improve → Situate</text>
  <text x="720" y="560" text-anchor="middle" font-size="9" fill="#555">→ Transfer to real-world performance</text>

  <!-- Source attribution -->
  <text x="450" y="610" text-anchor="middle" font-size="9" fill="#AAA">Wikipedia for AI Learning Research · April 2026 · Batch 5 Update</text>
</svg>