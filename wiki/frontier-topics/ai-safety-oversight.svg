<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">AI Research Safety: Tiered Oversight Model</text>

  <!-- Risk arrow -->
  <text x="25" y="100" font-size="11" fill="#64748b" transform="rotate(-90, 25, 250)">Risk Level</text>
  <line x1="45" y1="60" x2="45" y2="450" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker></defs>

  <!-- Human involvement arrow -->
  <text x="350" y="470" text-anchor="middle" font-size="11" fill="#64748b">Human Involvement Required</text>
  <line x1="60" y1="455" x2="680" y2="455" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Tier 1: Full Autonomy -->
  <rect x="60" y="55" width="280" height="90" rx="8" fill="url(#g1)" stroke="#22c55e" stroke-width="2"/>
  <circle cx="80" cy="75" r="10" fill="#22c55e"/>
  <text x="95" y="79" font-size="12" font-weight="bold" fill="#15803d">Tier 1: Full Autonomy</text>
  <text x="75" y="100" font-size="11" fill="#334155">Hyperparameter tuning, code optimization</text>
  <text x="75" y="116" font-size="11" fill="#334155">Reproducibility checks, format validation</text>
  <text x="75" y="136" font-size="10" fill="#64748b" font-style="italic">No human review needed</text>

  <!-- Tier 2: Human-in-the-Loop -->
  <rect x="160" y="160" width="320" height="90" rx="8" fill="url(#g2)" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="180" cy="180" r="10" fill="#3b82f6"/>
  <text x="195" y="184" font-size="12" font-weight="bold" fill="#1d4ed8">Tier 2: Human-in-the-Loop</text>
  <text x="175" y="205" font-size="11" fill="#334155">Experiment design, result interpretation</text>
  <text x="175" y="221" font-size="11" fill="#334155">Literature review, methodology selection</text>
  <text x="175" y="241" font-size="10" fill="#64748b" font-style="italic">Human reviews key decisions</text>

  <!-- Tier 3: Human-on-the-Loop -->
  <rect x="280" y="265" width="320" height="90" rx="8" fill="url(#g3)" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="300" cy="285" r="10" fill="#f59e0b"/>
  <text x="315" y="289" font-size="12" font-weight="bold" fill="#b45309">Tier 3: Human-on-the-Loop</text>
  <text x="295" y="310" font-size="11" fill="#334155">Paper generation, peer review submission</text>
  <text x="295" y="326" font-size="11" fill="#334155">Public data release, model deployment</text>
  <text x="295" y="346" font-size="10" fill="#64748b" font-style="italic">Human approves all outputs before release</text>

  <!-- Tier 4: Human-Led -->
  <rect x="380" y="370" width="300" height="75" rx="8" fill="url(#g4)" stroke="#ef4444" stroke-width="2"/>
  <circle cx="400" cy="390" r="10" fill="#ef4444"/>
  <text x="415" y="394" font-size="12" font-weight="bold" fill="#dc2626">Tier 4: Human-Led</text>
  <text x="395" y="415" font-size="11" fill="#334155">Novel capability discovery, safety research</text>
  <text x="395" y="435" font-size="10" fill="#64748b" font-style="italic">AI assists but human drives</text>

  <!-- Connecting arrows -->
  <path d="M200,145 L280,160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M360,250 L420,265" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M480,355 L500,370" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>