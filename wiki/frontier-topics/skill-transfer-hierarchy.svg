<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a6fa5"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
    <linearGradient id="gSim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="gRec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
    <linearGradient id="gCom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="gEdu" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">Hierarchical Skill Transfer: How Knowledge Flows Across Domains</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#666">Based on SkillX (ICML 2026), OpenWorldLib (2026), and the Unified Learning Loop</text>

  <!-- ===== SKILL HIERARCHY (left column) ===== -->
  <text x="160" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Skill Hierarchy (SkillX)</text>

  <!-- Planning Skills -->
  <rect x="40" y="100" width="240" height="70" rx="10" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="124" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Planning Skills</text>
  <text x="160" y="142" text-anchor="middle" font-size="10" fill="#3949ab">Task decomposition &amp; sequencing</text>
  <text x="160" y="158" text-anchor="middle" font-size="9" fill="#5c6bc0" font-style="italic">Most helps weaker learners</text>

  <!-- Arrow down -->
  <line x1="160" y1="170" x2="160" y2="186" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Functional Skills -->
  <rect x="40" y="190" width="240" height="70" rx="10" fill="#c5cae9" stroke="#3949ab" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a237e">Functional Skills</text>
  <text x="160" y="232" text-anchor="middle" font-size="10" fill="#283593">Reusable procedures &amp; routines</text>
  <text x="160" y="248" text-anchor="middle" font-size="9" fill="#3949ab" font-style="italic">Largest performance contributor</text>

  <!-- Arrow down -->
  <line x1="160" y1="260" x2="160" y2="276" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Atomic Skills -->
  <rect x="40" y="280" width="240" height="70" rx="10" fill="#9fa8da" stroke="#283593" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="304" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Atomic Skills</text>
  <text x="160" y="322" text-anchor="middle" font-size="10" fill="#e8eaf6">Single operations &amp; facts</text>
  <text x="160" y="338" text-anchor="middle" font-size="9" fill="#c5cae9" font-style="italic">Foundation layer; clarifies APIs</text>

  <!-- ===== DOMAIN COLUMNS (right side) ===== -->
  <!-- Column headers -->
  <text x="430" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Simulation</text>
  <text x="600" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Recursion</text>
  <text x="770" y="86" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">Commerce</text>

  <!-- Simulation column -->
  <rect x="340" y="100" width="180" height="55" rx="8" fill="url(#gSim)" stroke="#1565c0" stroke-width="1" filter="url(#sh)"/>
  <text x="430" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Navigate goals</text>
  <text x="430" y="135" text-anchor="middle" font-size="9" fill="#1565c0">Multi-step action planning</text>
  <text x="430" y="148" text-anchor="middle" font-size="8" fill="#42a5f5">DreamerV3, Genie 3</text>

  <rect x="340" y="190" width="180" height="55" rx="8" fill="url(#gSim)" stroke="#1565c0" stroke-width="1" filter="url(#sh)"/>
  <text x="430" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Interact with objects</text>
  <text x="430" y="225" text-anchor="middle" font-size="9" fill="#1565c0">Manipulation, navigation</text>
  <text x="430" y="238" text-anchor="middle" font-size="8" fill="#42a5f5">LOME, V-JEPA 2.1</text>

  <rect x="340" y="280" width="180" height="55" rx="8" fill="url(#gSim)" stroke="#1565c0" stroke-width="1" filter="url(#sh)"/>
  <text x="430" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#0d47a1">Recognize objects</text>
  <text x="430" y="315" text-anchor="middle" font-size="9" fill="#1565c0">Perception, state reading</text>
  <text x="430" y="328" text-anchor="middle" font-size="8" fill="#42a5f5">OpenWorldLib Operator</text>

  <!-- Recursion column -->
  <rect x="530" y="100" width="140" height="55" rx="8" fill="url(#gRec)" stroke="#c62828" stroke-width="1" filter="url(#sh)"/>
  <text x="600" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">Meta-strategy</text>
  <text x="600" y="135" text-anchor="middle" font-size="9" fill="#c62828">How to improve</text>
  <text x="600" y="148" text-anchor="middle" font-size="8" fill="#ef5350">Hyperagents, MetaClaw</text>

  <rect x="530" y="190" width="140" height="55" rx="8" fill="url(#gRec)" stroke="#c62828" stroke-width="1" filter="url(#sh)"/>
  <text x="600" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">Skill evolution</text>
  <text x="600" y="225" text-anchor="middle" font-size="9" fill="#c62828">Tool use, code patterns</text>
  <text x="600" y="238" text-anchor="middle" font-size="8" fill="#ef5350">SkillX, EvoSkills</text>

  <rect x="530" y="280" width="140" height="55" rx="8" fill="url(#gRec)" stroke="#c62828" stroke-width="1" filter="url(#sh)"/>
  <text x="600" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">Benchmark perf.</text>
  <text x="600" y="315" text-anchor="middle" font-size="9" fill="#c62828">Single-task execution</text>
  <text x="600" y="328" text-anchor="middle" font-size="8" fill="#ef5350">Self-Distillation, TRT</text>

  <!-- Commerce column -->
  <rect x="680" y="100" width="180" height="55" rx="8" fill="url(#gCom)" stroke="#2e7d32" stroke-width="1" filter="url(#sh)"/>
  <text x="770" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">Purchase strategy</text>
  <text x="770" y="135" text-anchor="middle" font-size="9" fill="#2e7d32">Budget, multi-item plans</text>
  <text x="770" y="148" text-anchor="middle" font-size="8" fill="#66bb6a">AgenticShop, UCP</text>

  <rect x="680" y="190" width="180" height="55" rx="8" fill="url(#gCom)" stroke="#2e7d32" stroke-width="1" filter="url(#sh)"/>
  <text x="770" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">Product comparison</text>
  <text x="770" y="225" text-anchor="middle" font-size="9" fill="#2e7d32">Multi-criteria evaluation</text>
  <text x="770" y="238" text-anchor="middle" font-size="8" fill="#66bb6a">ProductResearch, MemRerank</text>

  <rect x="680" y="280" width="180" height="55" rx="8" fill="url(#gCom)" stroke="#2e7d32" stroke-width="1" filter="url(#sh)"/>
  <text x="770" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#1b5e20">Read product specs</text>
  <text x="770" y="315" text-anchor="middle" font-size="9" fill="#2e7d32">Factual extraction</text>
  <text x="770" y="328" text-anchor="middle" font-size="8" fill="#66bb6a">CogSearch, ACES</text>

  <!-- ===== TRANSFER ARROWS (horizontal) ===== -->
  <line x1="280" y1="127" x2="335" y2="127" stroke="#4a6fa5" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="280" y1="217" x2="335" y2="217" stroke="#4a6fa5" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="280" y1="307" x2="335" y2="307" stroke="#4a6fa5" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ===== EDUCATION APPLICATION (bottom) ===== -->
  <rect x="40" y="380" width="880" height="100" rx="12" fill="url(#gEdu)" stroke="#f9a825" stroke-width="2" filter="url(#sh)"/>
  <text x="480" y="404" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">Education Application: How Students Learn Through the Same Hierarchy</text>

  <!-- Three education boxes inside -->
  <rect x="60" y="416" width="260" height="50" rx="6" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
  <text x="190" y="436" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Metacognitive: "How do I approach this?"</text>
  <text x="190" y="452" text-anchor="middle" font-size="9" fill="#f57c00">Study strategies, problem decomposition</text>

  <rect x="340" y="416" width="260" height="50" rx="6" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
  <text x="470" y="436" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Procedural: "How do I do this step?"</text>
  <text x="470" y="452" text-anchor="middle" font-size="9" fill="#f57c00">Lab techniques, calculations, methods</text>

  <rect x="620" y="416" width="260" height="50" rx="6" fill="#fff8e1" stroke="#ff8f00" stroke-width="1"/>
  <text x="750" y="436" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Foundational: "What is this thing?"</text>
  <text x="750" y="452" text-anchor="middle" font-size="9" fill="#f57c00">Definitions, formulas, basic facts</text>

  <!-- Arrow from hierarchy to education -->
  <line x1="160" y1="355" x2="160" y2="375" stroke="#f9a825" stroke-width="2" marker-end="url(#arr)"/>
  <text x="175" y="368" font-size="9" fill="#e65100" font-weight="bold">maps to</text>

  <!-- ===== BELIEF REVISION FLOW (bottom section) ===== -->
  <rect x="40" y="500" width="880" height="120" rx="12" fill="#f5f5f5" stroke="#78909c" stroke-width="1.5" filter="url(#sh)"/>
  <text x="480" y="524" text-anchor="middle" font-size="14" font-weight="bold" fill="#37474f">Dynamic Belief Revision (ClawArena): The Missing Learning Skill</text>

  <!-- Flow: Observe → Conflict → Revise → Verify -->
  <rect x="70" y="540" width="140" height="56" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="140" y="562" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d47a1">Observe</text>
  <text x="140" y="578" text-anchor="middle" font-size="9" fill="#1565c0">Gather multi-source evidence</text>

  <line x1="210" y1="568" x2="260" y2="568" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="265" y="540" width="140" height="56" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="335" y="562" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Detect Conflict</text>
  <text x="335" y="578" text-anchor="middle" font-size="9" fill="#f57c00">Sources disagree; info changes</text>

  <line x1="405" y1="568" x2="455" y2="568" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="460" y="540" width="140" height="56" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="530" y="562" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Revise Beliefs</text>
  <text x="530" y="578" text-anchor="middle" font-size="9" fill="#ef5350">Update proportional to evidence</text>

  <line x1="600" y1="568" x2="650" y2="568" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="655" y="540" width="140" height="56" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="725" y="562" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">Verify &amp; Act</text>
  <text x="725" y="578" text-anchor="middle" font-size="9" fill="#2e7d32">Confirm revision; proceed</text>

  <!-- Feedback arrow -->
  <path d="M 795 568 Q 840 568 840 530 Q 840 510 480 510 Q 50 510 50 540 Q 50 568 70 568" fill="none" stroke="#78909c" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="480" y="506" text-anchor="middle" font-size="9" fill="#78909c" font-style="italic">New information arrives → cycle repeats</text>

  <!-- Caption -->
  <text x="480" y="634" text-anchor="middle" font-size="10" fill="#9e9e9e" font-style="italic">Figure: Skill hierarchy transfers across domains (top); belief revision cycle required for real-world learning (bottom). April 2026 update.</text>
</svg>
