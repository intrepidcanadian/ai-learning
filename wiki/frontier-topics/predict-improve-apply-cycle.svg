<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#276749"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b46c1"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#718096"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fb" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#16213e">The Predict-Improve-Apply Cycle</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#718096">How AI helps humans learn subjects for real-world application</text>

  <!-- Phase 1: PREDICT (top-left) -->
  <rect x="60" y="90" width="240" height="200" rx="12" fill="#ebf8ff" stroke="#2b6cb0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="90" width="240" height="36" rx="12" fill="#2b6cb0"/>
  <rect x="60" y="114" width="240" height="12" fill="#2b6cb0"/>
  <text x="180" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="white">1. PREDICT</text>
  <text x="180" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#2b6cb0">"What would happen if...?"</text>
  <text x="80" y="168" font-size="10" fill="#4a5568">World Models &amp; Simulation</text>
  <line x1="80" y1="174" x2="280" y2="174" stroke="#bee3f8" stroke-width="1"/>
  <text x="80" y="192" font-size="9" fill="#718096">&#8226; DreamerV3 / Dreamer 4</text>
  <text x="80" y="207" font-size="9" fill="#718096">&#8226; Genie 3 (interactive worlds)</text>
  <text x="80" y="222" font-size="9" fill="#718096">&#8226; Cosmos-Predict2.5 (video sim)</text>
  <text x="80" y="237" font-size="9" fill="#718096">&#8226; FOREAGENT (predict-then-verify)</text>
  <text x="80" y="252" font-size="9" fill="#718096">&#8226; LeWM / V-JEPA 2 (efficient JEPA)</text>
  <text x="80" y="272" font-size="9" font-style="italic" fill="#2b6cb0">Output: Mental models, intuitions</text>

  <!-- Phase 2: IMPROVE (top-right) -->
  <rect x="380" y="90" width="240" height="200" rx="12" fill="#f0fff4" stroke="#276749" stroke-width="2" filter="url(#shadow)"/>
  <rect x="380" y="90" width="240" height="36" rx="12" fill="#276749"/>
  <rect x="380" y="114" width="240" height="12" fill="#276749"/>
  <text x="500" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="white">2. IMPROVE</text>
  <text x="500" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#276749">"How can I do better?"</text>
  <text x="400" y="168" font-size="10" fill="#4a5568">Recursive Self-Improvement</text>
  <line x1="400" y1="174" x2="600" y2="174" stroke="#c6f6d5" stroke-width="1"/>
  <text x="400" y="192" font-size="9" fill="#718096">&#8226; LADDER (recursive decomposition)</text>
  <text x="400" y="207" font-size="9" fill="#718096">&#8226; TRT (test-time recursive thinking)</text>
  <text x="400" y="222" font-size="9" fill="#718096">&#8226; A-Evolve (self-rewriting agents)</text>
  <text x="400" y="237" font-size="9" fill="#718096">&#8226; SkillX (hierarchical skill transfer)</text>
  <text x="400" y="252" font-size="9" fill="#718096">&#8226; ICLR 2026 RSI Workshop</text>
  <text x="400" y="272" font-size="9" font-style="italic" fill="#276749">Output: Refined strategies, skills</text>

  <!-- Phase 3: APPLY (right) -->
  <rect x="640" y="90" width="220" height="200" rx="12" fill="#faf5ff" stroke="#6b46c1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="640" y="90" width="220" height="36" rx="12" fill="#6b46c1"/>
  <rect x="640" y="114" width="220" height="12" fill="#6b46c1"/>
  <text x="750" y="113" text-anchor="middle" font-size="14" font-weight="700" fill="white">3. APPLY</text>
  <text x="750" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#6b46c1">"Does it work in reality?"</text>
  <text x="660" y="168" font-size="10" fill="#4a5568">Authentic Deployment</text>
  <line x1="660" y1="174" x2="840" y2="174" stroke="#e9d8fd" stroke-width="1"/>
  <text x="660" y="192" font-size="9" fill="#718096">&#8226; MedSimAI (clinical skills)</text>
  <text x="660" y="207" font-size="9" fill="#718096">&#8226; ShopSimulator (e-commerce)</text>
  <text x="660" y="222" font-size="9" fill="#718096">&#8226; Canvas AI (LMS deployment)</text>
  <text x="660" y="237" font-size="9" fill="#718096">&#8226; AgenticRS (recommendations)</text>
  <text x="660" y="252" font-size="9" fill="#718096">&#8226; Real market outcomes</text>
  <text x="660" y="272" font-size="9" font-style="italic" fill="#6b46c1">Output: Verified competence</text>

  <!-- Arrows between phases -->
  <path d="M 300 180 L 370 180" stroke="#2b6cb0" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="335" y="173" text-anchor="middle" font-size="8" fill="#718096">builds</text>
  <text x="335" y="193" text-anchor="middle" font-size="8" fill="#718096">intuition</text>

  <path d="M 620 180 L 632 180" stroke="#276749" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="626" y="173" text-anchor="middle" font-size="8" fill="#718096">tests</text>
  <text x="626" y="193" text-anchor="middle" font-size="8" fill="#718096">in reality</text>

  <!-- Recursive feedback arrow (Apply back to Predict) -->
  <path d="M 750 295 C 750 370 180 370 180 295" stroke="#718096" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowGray)"/>
  <text x="465" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#718096">Feedback Loop: Real-world outcomes generate new prediction targets</text>

  <!-- Evidence boxes at bottom -->
  <rect x="60" y="400" width="260" height="100" rx="8" fill="white" stroke="#e2e6ed" stroke-width="1"/>
  <text x="72" y="420" font-size="10" font-weight="700" fill="#16213e">Evidence: Predict Phase</text>
  <text x="72" y="438" font-size="9" fill="#718096">FOREAGENT: 6x acceleration via predict-</text>
  <text x="72" y="451" font-size="9" fill="#718096">then-verify (Zheng et al., 2026)</text>
  <text x="72" y="468" font-size="9" fill="#718096">Cosmos-Predict2.5: 200M videos, 30s</text>
  <text x="72" y="481" font-size="9" fill="#718096">coherent generation (NVIDIA, 2026)</text>

  <rect x="340" y="400" width="240" height="100" rx="8" fill="white" stroke="#e2e6ed" stroke-width="1"/>
  <text x="352" y="420" font-size="10" font-weight="700" fill="#16213e">Evidence: Improve Phase</text>
  <text x="352" y="438" font-size="9" fill="#718096">LADDER: 1% → 82% math accuracy</text>
  <text x="352" y="451" font-size="9" fill="#718096">via recursive decomposition</text>
  <text x="352" y="468" font-size="9" fill="#718096">ICLR 2026 RSI Workshop: first</text>
  <text x="352" y="481" font-size="9" fill="#718096">dedicated venue for RSI research</text>

  <rect x="600" y="400" width="260" height="100" rx="8" fill="white" stroke="#e2e6ed" stroke-width="1"/>
  <text x="612" y="420" font-size="10" font-weight="700" fill="#16213e">Evidence: Apply Phase</text>
  <text x="612" y="438" font-size="9" fill="#718096">MedSimAI: Cohen's d = 0.75 in clinical</text>
  <text x="612" y="451" font-size="9" fill="#718096">skills (410 students, 3 institutions)</text>
  <text x="612" y="468" font-size="9" fill="#718096">OECD: 127% improvement with designed</text>
  <text x="612" y="481" font-size="9" fill="#718096">scaffolding vs -17% with raw AI access</text>

  <!-- Key insight box -->
  <rect x="120" y="525" width="660" height="70" rx="8" fill="#16213e" filter="url(#shadow)"/>
  <text x="450" y="550" text-anchor="middle" font-size="12" font-weight="700" fill="white">Key Insight: The cycle must be designed, not merely available</text>
  <text x="450" y="570" text-anchor="middle" font-size="10" fill="#a8b2c1">Pedagogically designed AI produces 127% improvement; generic AI access produces dependency.</text>
  <text x="450" y="585" text-anchor="middle" font-size="9" fill="#7b8794">Source: OECD Digital Education Outlook 2026</text>
</svg>
