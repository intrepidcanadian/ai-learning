<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182ce"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">Self-Driving Laboratory: Automated Experiment Cycle</text>

  <!-- Central cycle: 4 stages -->
  <!-- Stage 1: Hypothesize -->
  <rect x="250" y="55" width="200" height="70" rx="10" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
  <text x="350" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#2b6cb0">1. Hypothesize</text>
  <text x="350" y="100" text-anchor="middle" font-size="11" fill="#4a5568">LLM / Bayesian optimizer</text>
  <text x="350" y="115" text-anchor="middle" font-size="11" fill="#4a5568">proposes next experiment</text>

  <!-- Stage 2: Execute -->
  <rect x="470" y="190" width="200" height="70" rx="10" fill="#f0fff4" stroke="#38a169" stroke-width="2"/>
  <text x="570" y="217" text-anchor="middle" font-size="14" font-weight="bold" fill="#276749">2. Execute</text>
  <text x="570" y="235" text-anchor="middle" font-size="11" fill="#4a5568">Robotic platform runs</text>
  <text x="570" y="250" text-anchor="middle" font-size="11" fill="#4a5568">synthesis + measurement</text>

  <!-- Stage 3: Analyze -->
  <rect x="250" y="330" width="200" height="70" rx="10" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
  <text x="350" y="357" text-anchor="middle" font-size="14" font-weight="bold" fill="#553c9a">3. Analyze</text>
  <text x="350" y="375" text-anchor="middle" font-size="11" fill="#4a5568">AI evaluates results,</text>
  <text x="350" y="390" text-anchor="middle" font-size="11" fill="#4a5568">updates knowledge base</text>

  <!-- Stage 4: Decide -->
  <rect x="30" y="190" width="200" height="70" rx="10" fill="#fffff0" stroke="#d69e2e" stroke-width="2"/>
  <text x="130" y="217" text-anchor="middle" font-size="14" font-weight="bold" fill="#975a16">4. Decide</text>
  <text x="130" y="235" text-anchor="middle" font-size="11" fill="#4a5568">Explore new direction or</text>
  <text x="130" y="250" text-anchor="middle" font-size="11" fill="#4a5568">exploit promising result</text>

  <!-- Arrows connecting stages (clockwise) -->
  <path d="M 450 100 Q 510 100 510 190" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 530 260 Q 530 330 450 355" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 250 365 Q 190 365 190 260" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 170 190 Q 170 125 250 95" fill="none" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Center: Orchestration -->
  <circle cx="350" cy="225" r="50" fill="#fff5f5" stroke="#e53e3e" stroke-width="2"/>
  <text x="350" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="#c53030">Orchestrator</text>
  <text x="350" y="237" text-anchor="middle" font-size="10" fill="#4a5568">(Atlas, SDL 2.0)</text>

  <!-- Dotted lines from orchestrator to each stage -->
  <line x1="350" y1="175" x2="350" y2="125" stroke="#e53e3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="225" x2="470" y2="225" stroke="#e53e3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="275" x2="350" y2="330" stroke="#e53e3e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="225" x2="230" y2="225" stroke="#e53e3e" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom: Comparison labels -->
  <rect x="30" y="430" width="300" height="55" rx="8" fill="#f7fafc" stroke="#a0aec0" stroke-width="1"/>
  <text x="180" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a5568">Physical SDL</text>
  <text x="180" y="470" text-anchor="middle" font-size="10" fill="#718096">Chemistry, materials, biology labs</text>

  <rect x="370" y="430" width="300" height="55" rx="8" fill="#f7fafc" stroke="#a0aec0" stroke-width="1"/>
  <text x="520" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a5568">Computational SDL</text>
  <text x="520" y="470" text-anchor="middle" font-size="10" fill="#718096">ML experiments, A/B tests, simulations</text>

  <!-- Arrow between the two -->
  <line x1="330" y1="457" x2="370" y2="457" stroke="#3182ce" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="350" y="447" text-anchor="middle" font-size="9" fill="#3182ce">same</text>
  <text x="350" y="478" text-anchor="middle" font-size="9" fill="#3182ce">pattern</text>
</svg>
