<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Agentic Tree Search: Experiment Exploration Strategy</text>

  <!-- Root node -->
  <circle cx="360" cy="80" r="22" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="85" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Root</text>
  <text x="360" y="110" text-anchor="middle" font-size="9" fill="#64748b">Initial hypothesis</text>

  <!-- Level 1 branches -->
  <line x1="345" y1="100" x2="200" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="102" x2="360" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="100" x2="520" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Level 1 nodes -->
  <circle cx="200" cy="178" r="20" fill="#22c55e" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="182" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Exp A</text>

  <circle cx="360" cy="178" r="20" fill="#22c55e" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="182" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Exp B</text>

  <circle cx="520" cy="178" r="20" fill="#ef4444" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="520" y="182" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Exp C</text>
  <text x="520" y="210" text-anchor="middle" font-size="8" fill="#ef4444">✗ Pruned (buggy)</text>

  <!-- Level 2 from Exp A -->
  <line x1="188" y1="196" x2="120" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="212" y1="196" x2="260" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="120" cy="278" r="18" fill="#22c55e" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="282" text-anchor="middle" font-size="8" fill="white" font-weight="bold">A.1</text>

  <circle cx="260" cy="278" r="18" fill="#f59e0b" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="282" text-anchor="middle" font-size="8" fill="white" font-weight="bold">A.2</text>
  <text x="260" y="306" text-anchor="middle" font-size="8" fill="#d97706">△ Low perf</text>

  <!-- Level 2 from Exp B -->
  <line x1="348" y1="196" x2="340" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="372" y1="196" x2="430" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <circle cx="340" cy="278" r="18" fill="#22c55e" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="282" text-anchor="middle" font-size="8" fill="white" font-weight="bold">B.1</text>

  <circle cx="430" cy="278" r="18" fill="#22c55e" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="430" y="282" text-anchor="middle" font-size="8" fill="white" font-weight="bold">B.2</text>

  <!-- Level 3 - best path -->
  <line x1="108" y1="294" x2="80" y2="350" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <circle cx="80" cy="368" r="18" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="372" text-anchor="middle" font-size="8" fill="white" font-weight="bold">A.1.1</text>

  <line x1="340" y1="296" x2="340" y2="350" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <circle cx="340" cy="368" r="18" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="372" text-anchor="middle" font-size="8" fill="white" font-weight="bold">B.1.1</text>

  <!-- Best path highlight -->
  <text x="340" y="400" text-anchor="middle" font-size="9" fill="#7c3aed" font-weight="bold">★ Best path selected</text>

  <!-- Legend -->
  <rect x="540" y="240" width="165" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="622" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">Legend</text>

  <circle cx="560" cy="280" r="7" fill="#22c55e"/>
  <text x="575" y="284" font-size="9" fill="#475569">Success (non-buggy)</text>

  <circle cx="560" cy="304" r="7" fill="#ef4444"/>
  <text x="575" y="308" font-size="9" fill="#475569">Failed (pruned)</text>

  <circle cx="560" cy="328" r="7" fill="#f59e0b"/>
  <text x="575" y="332" font-size="9" fill="#475569">Low performance</text>

  <circle cx="560" cy="352" r="7" fill="#8b5cf6"/>
  <text x="575" y="356" font-size="9" fill="#475569">Leaf (final result)</text>

  <line x1="553" y1="375" x2="575" y2="375" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="580" y="379" font-size="9" fill="#475569">Best path</text>

  <!-- Process annotations -->
  <rect x="15" y="420" width="690" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="360" y="438" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="bold">Per-node cycle: Generate plan + code → Execute → Save outputs → Plot → VLM critique → Branch or prune</text>
  <text x="360" y="456" text-anchor="middle" font-size="9" fill="#3b82f6">Quality improves sharply from 5→15 nodes, diminishing returns above ~25 nodes (test-time compute scaling)</text>
</svg>
